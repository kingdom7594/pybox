			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\nPYTHON_XC=\"${SRCROOT}/Resources/Python.xcframework\"\n\n# Select simulator vs device Python framework\nif [ \"${PLATFORM_NAME}\" = \"iphonesimulator\" ]; then\n  FW_SUFFIX=\"ios-arm64_x86_64-simulator\"\nelse\n  FW_SUFFIX=\"ios-arm64\"\nfi\n\nSRC_FW=\"${PYTHON_XC}/${FW_SUFFIX}/Python.framework\"\nDST_FW=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Frameworks/Python.framework\"\nmkdir -p \"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Frameworks\"\nrsync -av --delete \"${SRC_FW}/\" \"${DST_FW}/\"\n\n# Copy complete stdlib to app bundle\nSRC_STDLIB=\"${PYTHON_XC}/lib/python3.14\"\nDST_STDLIB=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/python3.14\"\nmkdir -p \"${DST_STDLIB}\"\ncp -R \"${SRC_STDLIB}/.\" \"${DST_STDLIB}/\"\n\n# Copy platform-specific binary modules (lib-dynload) for device\nif [ -d \"${PYTHON_XC}/${FW_SUFFIX}/lib/python3.14/lib-dynload\" ]; then\n  mkdir -p \"${DST_STDLIB}/lib-dynload\"\n  cp -R \"${PYTHON_XC}/${FW_SUFFIX}/lib/python3.14/lib-dynload/.\" \"${DST_STDLIB}/lib-dynload/\" 2>/dev/null || true\nfi\n# Also copy lib-arm64 variant if available\nif [ -d \"${PYTHON_XC}/${FW_SUFFIX}/lib-arm64/python3.14/lib-dynload\" ]; then\n  mkdir -p \"${DST_STDLIB}/lib-dynload\"\n  cp -R \"${PYTHON_XC}/${FW_SUFFIX}/lib-arm64/python3.14/lib-dynload/.\" \"${DST_STDLIB}/lib-dynload/\" 2>/dev/null || true\nfi\n\n# Copy third-party Python packages (PIL, autopep8, etc.)\nSRC_SITE_PKGS=\"${SRCROOT}/Resources/site-packages\"\nDST_SITE_PKGS=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/site-packages\"\nif [ -d \"${SRC_SITE_PKGS}\" ]; then\n  rm -rf \"${DST_SITE_PKGS}\"\n  mkdir -p \"${DST_SITE_PKGS}\"\n  cp -R \"${SRC_SITE_PKGS}/.\" \"${DST_SITE_PKGS}/\"\nfi\n\n# Sign the framework (ad-hoc for simulator, real cert for device)\ncodesign --force --sign - \"${DST_FW}\" 2>/dev/null || true\n\n# Fix Info.plist for simulator builds\nif [ \"${PLATFORM_NAME}\" = \"iphonesimulator\" ]; then\n  INFO_PLIST=\"${BUILT_PRODUCTS_DIR}/${PRODUCT_NAME}.app/Info.plist\"\n  if [ -f \"${INFO_PLIST}\" ]; then\n    plutil -replace CFBundleSupportedPlatforms -json '[\"iPhoneSimulator\"]' \"${INFO_PLIST}\" 2>/dev/null || true\n  fi\nfi\n";
