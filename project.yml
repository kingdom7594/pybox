name: PyBox
options:
  bundleIdPrefix: com.huang.pybox
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: NO
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    SUPPORTS_MACCATALYST: NO
  configs:
    Debug:
      SUPPORTS_MACCATALYST: NO
      SUPPORTED_PLATFORMS: "iphonesimulator"
      VALIDATE_WORKSPACE: NO
    Release:
      SUPPORTS_MACCATALYST: NO
      SUPPORTED_PLATFORMS: "iphoneos"
      VALIDATE_WORKSPACE: NO
      DEVELOPMENT_TEAM: YGH3QAHBPK

targets:
  PyBox:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Features
      - path: Core
      - path: Shared
      - path: Resources
        excludes:
          - "Python.xcframework/**"
          - "site-packages/**"
          - "encode_extensions.py"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.pybox.ide
        INFOPLIST_KEY_CFBundleDisplayName: PyBox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "PyBox 需要使用麦克风来录制语音备忘"
        INFOPLIST_KEY_NSCameraUsageDescription: "PyBox 需要使用相机来扫描二维码"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        INFOPLIST_KEY_LSSupportsOpeningDocumentsInPlace: YES
        INFOPLIST_KEY_UIFileSharingEnabled: YES
        INFOPLIST_KEY_CFBundleDocumentTypes: '<array><dict><key>CFBundleTypeName</key><string>Python Script</string><key>CFBundleTypeRole</key><string>Editor</string><key>LSHandlerRank</key><string>Owner</string><key>LSItemContentTypes</key><array><string>public.python-script</string><string>public.plain-text</string><string>public.json</string><string>public.text</string></array></dict></array>'
        CODE_SIGN_ENTITLEMENTS: App/PyBox.entitlements
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: SnapKit
      - package: SQLite.swift
        product: SQLite
      - package: PythonKit
      - package: Citadel
      - sdk: $(SRCROOT)/Resources/Python.xcframework
      - target: PyBoxShare
      - target: PyBoxWidget
    postBuildScripts:
      - name: Embed Python Framework and Resources
        runOnlyWhenInstalling: false
        script: |
          set -e
          PYTHON_XC="${SRCROOT}/Resources/Python.xcframework"

          # Use CODESIGNING_FOLDER_PATH which is the actual .app that gets
          # archived and exported (in archive mode, BUILT_PRODUCTS_DIR points
          # to a symlinked dir that is not always writable to).
          APP_PATH="${CODESIGNING_FOLDER_PATH}"

          # Select simulator vs device Python framework
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            FW_SUFFIX="ios-arm64_x86_64-simulator"
          else
            FW_SUFFIX="ios-arm64"
          fi

          SRC_FW="${PYTHON_XC}/${FW_SUFFIX}/Python.framework"
          DST_FW="${APP_PATH}/Frameworks/Python.framework"
          mkdir -p "${APP_PATH}/Frameworks"
          # IMPORTANT: Exclude python3.14/ from the framework copy. Apple's
          # strict validator scans every file in Python.framework and rejects
          # unsigned files (including pure-Python .py). We copy stdlib to
          # .app root instead.
          rsync -av --delete --exclude='python3.14' "${SRC_FW}/" "${DST_FW}/"

          # Add required Info.plist fields to Python.framework (required for validator)
          FW_INFO_PLIST="${DST_FW}/Info.plist"
          if [ -f "${FW_INFO_PLIST}" ]; then
            /usr/libexec/PlistBuddy -c "Add CFBundleIdentifier string com.apple.python" "${FW_INFO_PLIST}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleExecutable string Python" "${FW_INFO_PLIST}" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add CFBundleName string Python" "${FW_INFO_PLIST}" 2>/dev/null || true
          fi

          # Copy pure Python stdlib to .app root (no .so files)
          SRC_STDLIB="${PYTHON_XC}/lib/python3.14"
          DST_STDLIB="${APP_PATH}/python3.14"
          mkdir -p "${DST_STDLIB}"
          rsync -av --exclude='*.so' "${SRC_STDLIB}/." "${DST_STDLIB}/"
          echo "[EmbedPython] APP_PATH=${APP_PATH}" 1>&2
          echo "[EmbedPython] DST_STDLIB=${DST_STDLIB}" 1>&2
          echo "[EmbedPython] STDLIB_COUNT=$(ls -1 "${DST_STDLIB}" | wc -l)" 1>&2
          echo "[EmbedPython] FW_PYTHON_COUNT=$(ls -1 "${DST_FW}/python3.14" 2>/dev/null | wc -l)" 1>&2

          # Collect platform-specific .so files into temp dir
          TEMP_EXT_DIR="${TARGET_BUILD_DIR}/python_extensions"
          rm -rf "${TEMP_EXT_DIR}"
          mkdir -p "${TEMP_EXT_DIR}/lib-dynload"
          if [ -d "${PYTHON_XC}/${FW_SUFFIX}/lib/python3.14/lib-dynload" ]; then
            cp -R "${PYTHON_XC}/${FW_SUFFIX}/lib/python3.14/lib-dynload/." "${TEMP_EXT_DIR}/lib-dynload/" 2>/dev/null || true
          fi
          if [ -d "${PYTHON_XC}/${FW_SUFFIX}/lib-arm64/python3.14/lib-dynload" ]; then
            cp -R "${PYTHON_XC}/${FW_SUFFIX}/lib-arm64/python3.14/lib-dynload/." "${TEMP_EXT_DIR}/lib-dynload/" 2>/dev/null || true
          fi

          # Copy third-party Python packages (pure Python only)
          SRC_SITE_PKGS="${SRCROOT}/Resources/site-packages"
          DST_SITE_PKGS="${DST_STDLIB}/site-packages"
          if [ -d "${SRC_SITE_PKGS}" ]; then
            rm -rf "${DST_SITE_PKGS}"
            mkdir -p "${DST_SITE_PKGS}"
            rsync -av --exclude='*.so' "${SRC_SITE_PKGS}/." "${DST_SITE_PKGS}/"
            # Collect PIL .so files
            mkdir -p "${TEMP_EXT_DIR}/site-packages/PIL"
            find "${SRC_SITE_PKGS}/PIL" -name "*.so" -exec cp {} "${TEMP_EXT_DIR}/site-packages/PIL/" \; 2>/dev/null || true
          fi

          # Encode all .so files as base64 plist (hides Mach-O magic bytes from validator)
          python3 "${SRCROOT}/Resources/encode_extensions.py" "${TEMP_EXT_DIR}" "${APP_PATH}/python_extensions.plist"
          rm -rf "${TEMP_EXT_DIR}"

          # Sign the framework
          codesign --force --sign - "${DST_FW}" 2>/dev/null || true

          # Fix Info.plist for simulator builds
          if [ "${PLATFORM_NAME}" = "iphonesimulator" ]; then
            INFO_PLIST="${APP_PATH}/Info.plist"
            if [ -f "${INFO_PLIST}" ]; then
              plutil -replace CFBundleSupportedPlatforms -json '["iPhoneSimulator"]' "${INFO_PLIST}" 2>/dev/null || true
            fi
          fi

  PyBoxShare:
    type: app-extension
    platform: iOS
    sources:
      - path: PyBoxShare
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.pybox.ide.share
        INFOPLIST_KEY_CFBundleDisplayName: PyBox
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PyBoxShare/PyBoxShare.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PyBoxShare/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SUPPORTED_PLATFORMS: "iphonesimulator"
          CODE_SIGN_IDENTITY: "-"
        Release:
          SUPPORTED_PLATFORMS: "iphoneos"

  PyBoxWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PyBoxWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.pybox.ide.widget
        INFOPLIST_KEY_CFBundleDisplayName: PyBox Widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: PyBoxWidget/PyBoxWidget.entitlements
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PyBoxWidget/Info.plist
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          SUPPORTED_PLATFORMS: "iphonesimulator"
          CODE_SIGN_IDENTITY: "-"
        Release:
          SUPPORTED_PLATFORMS: "iphoneos"

  PyBoxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PyBoxTests
    dependencies:
      - target: PyBox
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.huang.pybox.ide.tests
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.6.0"
  SQLite.swift:
    url: https://github.com/stephencelis/SQLite.swift.git
    from: "0.14.1"
  PythonKit:
    url: https://github.com/pvieito/PythonKit.git
    branch: main
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.7.0"
