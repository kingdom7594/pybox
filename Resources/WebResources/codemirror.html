<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PyBox Code Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Monaco', monospace;
            background-color: #010202;
        }

        #editor {
            height: 100%;
            width: 100%;
            font-size: 13px;
            line-height: 1.7;
        }

        .cm-editor {
            height: 100%;
            background-color: #010202;
        }

        .cm-scroller {
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            font-family: 'JetBrains Mono', 'SF Mono', 'Menlo', monospace;
        }

        .cm-content {
            caret-color: #00A245;
            padding: 16px 0;
        }

        .cm-line {
            padding: 0 16px;
        }

        .cm-gutters {
            background-color: #040704;
            color: #4F4D48;
            border: none;
            padding-right: 0;
        }

        .cm-lineNumbers .cm-gutterElement {
            padding: 0 10px 0 8px;
            min-width: 48px;
            text-align: right;
        }

        .cm-activeLineGutter {
            background-color: #0A0F0B;
            color: #74716B;
        }

        .cm-activeLine {
            background-color: rgba(0, 162, 69, 0.06);
        }

        .cm-cursor {
            border-left-color: #00A245;
            border-left-width: 2px;
        }

        .cm-selectionBackground {
            background-color: rgba(0, 162, 69, 0.25) !important;
        }

        .cm-focused .cm-selectionBackground {
            background-color: rgba(0, 162, 69, 0.25) !important;
        }

        .cm-placeholder {
            color: #4F4D48;
            font-style: italic;
        }

        /* Python 语法高亮（emerald 主题） */
        .cm-keyword { color: #B28FEF; font-weight: 500; }
        .cm-string { color: #5BAE5F; }
        .cm-string2 { color: #5BAE5F; }
        .cm-number { color: #ED835E; }
        .cm-comment { color: #545F68; font-style: italic; }
        .cm-function { color: #1DB8CE; }
        .cm-variableName { color: #E9E8E4; }
        .cm-variableName.cm-def { color: #E9E8E4; }
        .cm-operator { color: #43AC9B; }
        .cm-punctuation { color: #74716B; }
        .cm-className { color: #E5C07B; }
        .cm-builtin { color: #43AC9B; }
        .cm-property { color: #1DB8CE; }
        .cm-definition { color: #1DB8CE; }
        .cm-typeName { color: #E5C07B; }
        .cm-meta { color: #8A8FE1; }
        .cm-attribute { color: #E5C07B; }
        .cm-tag { color: #B28FEF; }
        .cm-bracket { color: #74716B; }
        .cm-atom { color: #ED835E; }

        /* 自动补全 tooltip */
        .cm-tooltip-autocomplete {
            background-color: #111812 !important;
            border: 1px solid #212521 !important;
            border-radius: 10px !important;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4) !important;
            overflow: hidden;
        }

        .cm-tooltip-autocomplete ul li {
            padding: 6px 12px;
            font-size: 12px;
        }

        .cm-tooltip-autocomplete ul li[aria-selected] {
            background-color: #005000 !important;
            color: #E9E8E4 !important;
        }

        /* 搜索匹配高亮 */
        .cm-searchMatch {
            background-color: rgba(210, 154, 0, 0.25);
            outline: 1px solid #D29A00;
        }
        .cm-searchMatch.cm-searchMatch-selected {
            background-color: rgba(210, 154, 0, 0.5);
        }
    </style>
</head>
<body>
    <div id="editor"></div>

    <script type="module">
        import { EditorState } from 'https://esm.sh/@codemirror/state@6.4.1';
        import { EditorView, keymap, lineNumbers, highlightActiveLine, highlightActiveLineGutter, drawSelection, dropCursor, placeholder } from 'https://esm.sh/@codemirror/view@6.26.3';
        import { defaultKeymap, history, historyKeymap, indentWithTab } from 'https://esm.sh/@codemirror/commands@6.6.0';
        import { python } from 'https://esm.sh/@codemirror/lang-python@6.1.6';
        import { syntaxHighlighting, defaultHighlightStyle, bracketMatching, foldGutter, indentOnInput } from 'https://esm.sh/@codemirror/language@6.10.2';
        import { autocompletion, completionKeymap, closeBrackets, closeBracketsKeymap } from 'https://esm.sh/@codemirror/autocomplete@6.18.0';
        import { searchKeymap, highlightSelectionMatches } from 'https://esm.sh/@codemirror/search@6.5.6';

        const config = window.config || {};
        const initialCode = config.initialCode || '# Welcome to PyBox\n# Start coding here\n\nprint("Hello, PyBox!")\n';

        const updateListener = EditorView.updateListener.of((update) => {
            if (update.docChanged) {
                const code = update.state.doc.toString();
                window.webkit.messageHandlers.editor.postMessage({
                    type: 'codeChange',
                    code: code
                });
            }
        });

        const theme = EditorView.theme({
            '&': {
                backgroundColor: '#010202',
                color: '#E9E8E4',
                height: '100%'
            },
            '.cm-content': {
                caretColor: '#00A245',
                fontFamily: "'JetBrains Mono', 'SF Mono', 'Menlo', monospace",
                fontSize: (config.fontSize || 13) + 'px',
                lineHeight: '1.7'
            },
            '.cm-cursor': {
                borderLeftColor: '#00A245',
                borderLeftWidth: '2px'
            },
            '.cm-gutters': {
                backgroundColor: '#040704',
                color: '#4F4D48',
                border: 'none',
                fontFamily: "'JetBrains Mono', 'SF Mono', 'Menlo', monospace"
            },
            '.cm-activeLineGutter': {
                backgroundColor: '#0A0F0B',
                color: '#74716B'
            },
            '.cm-activeLine': {
                backgroundColor: 'rgba(0, 162, 69, 0.06)'
            },
            '&.cm-focused .cm-selectionBackground, .cm-selectionBackground': {
                backgroundColor: 'rgba(0, 162, 69, 0.25)'
            }
        });

        const state = EditorState.create({
            doc: initialCode,
            extensions: [
                lineNumbers(),
                highlightActiveLine(),
                highlightActiveLineGutter(),
                history(),
                foldGutter(),
                drawSelection(),
                dropCursor(),
                indentOnInput(),
                bracketMatching(),
                closeBrackets(),
                autocompletion(),
                highlightSelectionMatches(),
                python(),
                syntaxHighlighting(defaultHighlightStyle),
                keymap.of([
                    ...closeBracketsKeymap,
                    ...defaultKeymap,
                    ...searchKeymap,
                    ...historyKeymap,
                    ...completionKeymap,
                    indentWithTab
                ]),
                updateListener,
                theme,
                placeholder('Start coding...')
            ]
        });

        const view = new EditorView({
            state: state,
            parent: document.getElementById('editor')
        });

        window.setCode = (code) => {
            view.dispatch({
                changes: {
                    from: 0,
                    to: view.state.doc.length,
                    insert: code
                }
            });
        };

        window.getCode = () => {
            return view.state.doc.toString();
        };

        window.setFontSize = (size) => {
            document.querySelector('.cm-content').style.fontSize = size + 'px';
        };

        window.focusEditor = () => {
            view.focus();
        };

        window.webkit.messageHandlers.editor.postMessage({
            type: 'ready'
        });
    </script>
</body>
</html>
